{% extends "layout/base.html" %}

{% block title %}Yeni Talep{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card">
            <div class="card-header bg-white">
                <h5 class="mb-0">Yeni Talep Oluştur</h5>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('task.saveTask') }}">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Vatandaş Adı</label>
                        <input type="text" name="vatandas_adi" class="form-control"
                               placeholder="Ad Soyad" required minlength="2">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">İlçe</label>
                        <input type="text" name="ilce" class="form-control"
                               placeholder="İlçe adı" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Geliş Kanalı</label>
                        <select name="gelis_kanali" class="form-select" required>
                            <option value="">Seçiniz...</option>
                            {% for channel in channels %}
                                <option value="{{ channel }}">{{ channel }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Talep Metni</label>
                        <textarea name="talep_metni" id="talepMetni" class="form-control"
                                  rows="4" placeholder="Talep açıklamasını yazınız..."
                                  required minlength="3"></textarea>
                        <div class="mt-2 d-flex align-items-center gap-3 flex-wrap">
                            <button type="button" class="btn btn-outline-secondary btn-sm" id="predictBtn">
                                AI ile Tahmin Et
                            </button>
                            <div id="topKResults" class="d-none">
                                <small class="text-muted me-1"><i class="bi bi-bar-chart me-1"></i>Top-3:</small>
                                <span id="topKList"></span>
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Talep Tipi</label>
                        <select name="talep_tipi" id="talepTipi" class="form-select" required>
                            <option value="">Seçiniz...</option>
                            {% for tip in taskTypes %}
                                <option value="{{ tip }}">{{ tip }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="d-flex gap-2 justify-content-end">
                        <a href="{{ url_for('task.index') }}" class="btn btn-outline-secondary">İptal</a>
                        <button type="submit" class="btn btn-primary">Kaydet</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById("predictBtn").addEventListener("click", function () {
        const metin = document.getElementById("talepMetni").value.trim();
        if (!metin) { alert("Lütfen önce talep metnini giriniz."); return; }
        this.disabled = true;
        this.textContent = "Tahmin ediliyor...";
        fetch("/predict?text=" + encodeURIComponent(metin))
            .then(r => r.json())
            .then(data => {
                const select = document.getElementById("talepTipi");
                for (let opt of select.options) {
                    if (opt.value === data.tahmin) { opt.selected = true; break; }
                }
                const topKDiv  = document.getElementById("topKResults");
                const topKSpan = document.getElementById("topKList");
                if (data.top_k && data.top_k.length > 0) {
                    topKSpan.innerHTML = data.top_k
                        .map(t => `<span class="badge bg-secondary me-1">${t.tip} %${Math.round(t.olasilik * 100)}</span>`)
                        .join("");
                    topKDiv.classList.remove("d-none");
                }
            })
            .catch(() => alert("Tahmin alınamadı."))
            .finally(() => {
                this.disabled = false;
                this.textContent = "Tekrar Tahmin Et";
            });
    });
</script>
{% endblock %}
