<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talep Tipleri</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar-brand { font-weight: 700; letter-spacing: 1px; }
        .card { border: none; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="task_list.html">
            <i class="bi bi-clipboard2-check me-2"></i>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="task_list.html">Talepler</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="task_type.html">Talep Tipleri</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container py-4">

    <div id="alert-box"></div>

    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card mb-4">
                <div class="card-header bg-white">
                    <h5 class="mb-0"><i class="bi bi-gear me-2"></i>Talep Tipi Ekle</h5>
                </div>
                <div class="card-body">
                    <div class="d-flex gap-2">
                        <input type="text" id="yeniTip" class="form-control"
                               placeholder="Yeni tip adı..." required>
                        <button type="button" id="addBtn" class="btn btn-primary text-nowrap">
                            <i class="bi bi-plus-lg me-1"></i>Ekle
                        </button>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header bg-white d-flex justify-content-between align-items-center">
                    <h5 class="mb-0"><i class="bi bi-tags me-2"></i>Mevcut Tipler</h5>
                    <span class="badge bg-secondary" id="tipSayisi">0</span>
                </div>
                <ul class="list-group list-group-flush" id="tip-list">
                    <li class="list-group-item text-muted text-center py-4">
                        <div class="spinner-border spinner-border-sm" role="status"></div>
                        Yükleniyor...
                    </li>
                </ul>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API = "http://localhost:5000";

    const renkMap = {
        "Ulaşım": "primary",
        "Çevre ve Temizlik": "success",
        "Su ve Kanalizasyon": "info",
        "Park ve Bahçe": "warning",
        "İmar ve Yapı": "danger",
        "Elektrik ve Aydınlatma": "secondary",
        "Hayvan Kontrolü": "dark",
        "Yol ve Kaldırım": "primary",
        "Sosyal Yardım": "success",
        "Mezarlık Hizmetleri": "dark"
    };

    function getBadgeElement(tip) {
        const renk = renkMap[tip] || "secondary";
        const badge = document.createElement("span");
        badge.className = `badge bg-${renk}`;
        badge.textContent = tip;
        return badge;
    }

    function showAlert(message, type) {
        const alertBox = document.getElementById("alert-box");
        const wrapper = document.createElement("div");
        wrapper.className = `alert alert-${type} alert-dismissible fade show`;
        wrapper.setAttribute("role", "alert");
        wrapper.append(document.createTextNode(message));

        const button = document.createElement("button");
        button.type = "button";
        button.className = "btn-close";
        button.setAttribute("data-bs-dismiss", "alert");
        wrapper.appendChild(button);

        alertBox.replaceChildren(wrapper);
    }

    function setTaskTypeListStaticState(html) {
        document.getElementById("tip-list").innerHTML = html;
    }

    function buildTaskTypeItem(taskType) {
        const item = document.createElement("li");
        item.className = "list-group-item d-flex justify-content-between align-items-center";

        const content = document.createElement("div");
        content.appendChild(getBadgeElement(taskType.value));

        if (!taskType.supported) {
            const note = document.createElement("small");
            note.className = "d-block text-warning mt-1";
            note.textContent = "Modelde desteklenmiyor, formda görünmez.";
            content.appendChild(note);
        }

        item.appendChild(content);

        const deleteButton = document.createElement("button");
        deleteButton.className = "btn btn-sm btn-outline-danger";
        deleteButton.type = "button";

        const icon = document.createElement("i");
        icon.className = "bi bi-trash";
        deleteButton.appendChild(icon);
        deleteButton.addEventListener("click", () => deleteTaskType(taskType.value));
        item.appendChild(deleteButton);

        return item;
    }

    function loadTaskTypes() {
        fetch(`${API}/api/task-types`)
            .then((res) => res.json())
            .then((data) => {
                const list = document.getElementById("tip-list");
                const taskTypes = data.taskTypes || [];

                document.getElementById("tipSayisi").textContent = taskTypes.length;

                if (taskTypes.length === 0) {
                    setTaskTypeListStaticState(`
                        <li class="list-group-item text-muted text-center py-4">
                            Henüz hiç tip tanımlanmamış.
                        </li>
                    `);
                    return;
                }

                const fragment = document.createDocumentFragment();
                taskTypes.forEach((taskType) => {
                    fragment.appendChild(buildTaskTypeItem(taskType));
                });
                list.replaceChildren(fragment);
            })
            .catch(() => {
                setTaskTypeListStaticState(`
                    <li class="list-group-item text-danger text-center py-4">
                        Veriler yüklenemedi. Backend bağlantısını kontrol edin.
                    </li>
                `);
            });
    }

    document.getElementById("addBtn").addEventListener("click", function () {
        const isim = document.getElementById("yeniTip").value.trim();
        if (!isim) {
            showAlert("Talep tipi boş olamaz.", "warning");
            return;
        }

        fetch(`${API}/api/task-type/add`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({isim: isim})
        })
            .then((res) => res.json())
            .then((data) => {
                if (data.success) {
                    document.getElementById("yeniTip").value = "";
                    showAlert(data.message, "info");
                    loadTaskTypes();
                } else {
                    showAlert(data.message, "warning");
                }
            })
            .catch(() => showAlert("Bağlantı hatası.", "danger"));
    });

    function deleteTaskType(isim) {
        if (!confirm(`"${isim}" tipini silmek istediğinize emin misiniz?`)) return;

        fetch(`${API}/api/task-type/delete/${encodeURIComponent(isim)}`, {
            method: "DELETE"
        })
            .then((res) => res.json())
            .then((data) => {
                if (data.success) {
                    showAlert(data.message, "success");
                    loadTaskTypes();
                } else {
                    showAlert(data.message, "danger");
                }
            })
            .catch(() => showAlert("Bağlantı hatası.", "danger"));
    }

    loadTaskTypes();
</script>

</body>
</html>
