<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talepler</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar-brand { font-weight: 700; letter-spacing: 1px; }
        .card { border: none; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="task_list.html">
            <i class="bi bi-clipboard2-check me-2"></i>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="task_list.html">Talepler</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="task_type.html">Talep Tipleri</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container py-4">

    <div id="alert-box"></div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0">
            <i class="bi bi-list-ul me-2"></i>Talepler
        </h4>
        <a href="task_new.html" class="btn btn-primary">
            <i class="bi bi-plus-circle me-1"></i>Yeni Talep
        </a>
    </div>

    <div id="task-list">
        <div class="text-center text-muted py-5">
            <div class="spinner-border" role="status"></div>
            <p class="mt-3">Yükleniyor...</p>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API = "http://localhost:5000";

    const renkMap = {
        "Ulaşım": "primary",
        "Çevre ve Temizlik": "success",
        "Su ve Kanalizasyon": "info",
        "Park ve Bahçe": "warning",
        "İmar ve Yapı": "danger",
        "Elektrik ve Aydınlatma": "secondary",
        "Hayvan Kontrolü": "dark",
        "Yol ve Kaldırım": "primary",
        "Sosyal Yardım": "success",
        "Mezarlık Hizmetleri": "dark"
    };

    function buildIcon(iconName, className = "") {
        const icon = document.createElement("i");
        icon.className = `bi bi-${iconName}${className ? ` ${className}` : ""}`;
        return icon;
    }

    function getBadgeElement(tip) {
        const renk = renkMap[tip] || "secondary";
        const badge = document.createElement("span");
        badge.className = `badge bg-${renk}`;
        badge.textContent = tip;
        return badge;
    }

    function showAlert(message, type) {
        const alertBox = document.getElementById("alert-box");
        const wrapper = document.createElement("div");
        wrapper.className = `alert alert-${type} alert-dismissible fade show`;
        wrapper.setAttribute("role", "alert");
        wrapper.append(document.createTextNode(message));

        const button = document.createElement("button");
        button.type = "button";
        button.className = "btn-close";
        button.setAttribute("data-bs-dismiss", "alert");
        wrapper.appendChild(button);

        alertBox.replaceChildren(wrapper);
    }

    function formatDate(dateStr) {
        if (!dateStr) return "";
        const date = new Date(dateStr);
        return date.toLocaleDateString("tr-TR") + " " + date.toLocaleTimeString("tr-TR", {
            hour: "2-digit",
            minute: "2-digit"
        });
    }

    function setTaskListStaticState(html) {
        document.getElementById("task-list").innerHTML = html;
    }

    function buildTaskCard(task, taskTypes) {
        const varsayilanTip = task.onaylananTip || task.manuelTip || task.tahminTipi || "";
        const kanal = task.gelisKanali || "";
        const kanalIcon = kanal.toLowerCase().includes("çağrı") ? "telephone" : "phone";

        const card = document.createElement("div");
        card.className = "card mb-3";
        card.id = `task-${task.id}`;

        const body = document.createElement("div");
        body.className = "card-body";
        card.appendChild(body);

        const topRow = document.createElement("div");
        topRow.className = "d-flex justify-content-between align-items-start";
        body.appendChild(topRow);

        const content = document.createElement("div");
        topRow.appendChild(content);

        const title = document.createElement("h6");
        title.className = "card-title mb-1";
        title.append(document.createTextNode(task.vatandasAdi || ""));

        const district = document.createElement("small");
        district.className = "text-muted fw-normal";
        district.textContent = ` - ${task.ilce || ""}`;
        title.appendChild(district);
        content.appendChild(title);

        const text = document.createElement("p");
        text.className = "card-text mb-2";
        text.textContent = task.talepMetni || "";
        content.appendChild(text);

        const infoRow = document.createElement("div");
        infoRow.className = "d-flex align-items-center gap-2 flex-wrap";
        content.appendChild(infoRow);

        if (task.tahminTipi) {
            const predictionLabel = document.createElement("small");
            predictionLabel.className = "text-muted";
            predictionLabel.appendChild(buildIcon("cpu", "me-1"));
            predictionLabel.append(document.createTextNode("Tahmin:"));
            infoRow.appendChild(predictionLabel);
            infoRow.appendChild(getBadgeElement(task.tahminTipi));

            if (task.tahminOlasiligi) {
                const probability = document.createElement("small");
                probability.className = "text-muted";
                probability.textContent = `(%${Math.round(task.tahminOlasiligi * 100)})`;
                infoRow.appendChild(probability);
            }
        } else {
            const noPrediction = document.createElement("small");
            noPrediction.className = "text-muted";
            noPrediction.appendChild(buildIcon("cpu", "me-1"));
            noPrediction.append(document.createTextNode("AI tahmini yok"));
            infoRow.appendChild(noPrediction);
        }

        if (task.manuelTip) {
            const manualWrap = document.createElement("span");
            manualWrap.className = "ms-2";
            manualWrap.appendChild(buildIcon("pencil-square", "text-primary me-1"));

            const manualLabel = document.createElement("small");
            manualLabel.className = "text-primary fw-semibold";
            manualLabel.textContent = "Seçilen:";
            manualWrap.appendChild(manualLabel);

            infoRow.appendChild(manualWrap);
            infoRow.appendChild(getBadgeElement(task.manuelTip));
        }

        if (task.onaylandiMi && task.onaylananTip) {
            const approvedWrap = document.createElement("span");
            approvedWrap.className = "ms-2";
            approvedWrap.appendChild(buildIcon("check-circle-fill", "text-success me-1"));

            const approvedLabel = document.createElement("small");
            approvedLabel.className = "text-success fw-semibold";
            approvedLabel.textContent = "Onaylandı:";
            approvedWrap.appendChild(approvedLabel);

            infoRow.appendChild(approvedWrap);
            infoRow.appendChild(getBadgeElement(task.onaylananTip));
        }

        const channel = document.createElement("small");
        channel.className = "text-muted ms-auto";
        channel.appendChild(buildIcon(kanalIcon, "me-1"));
        channel.append(document.createTextNode(kanal));
        infoRow.appendChild(channel);

        if (!task.onaylandiMi) {
            const actionWrap = document.createElement("div");
            actionWrap.className = "ms-3";
            topRow.appendChild(actionWrap);

            const toggleButton = document.createElement("button");
            toggleButton.className = "btn btn-sm btn-outline-primary";
            toggleButton.setAttribute("data-bs-toggle", "collapse");
            toggleButton.setAttribute("data-bs-target", `#approve-${task.id}`);
            toggleButton.appendChild(buildIcon("check2"));
            toggleButton.append(document.createTextNode(" Onayla"));
            actionWrap.appendChild(toggleButton);

            const collapse = document.createElement("div");
            collapse.className = "collapse mt-3";
            collapse.id = `approve-${task.id}`;
            body.appendChild(collapse);

            const approveRow = document.createElement("div");
            approveRow.className = "d-flex gap-2 align-items-center flex-wrap";
            collapse.appendChild(approveRow);

            const approveLabel = document.createElement("label");
            approveLabel.className = "form-label mb-0 fw-semibold";
            approveLabel.textContent = "Onaylanacak Tip:";
            approveRow.appendChild(approveLabel);

            const select = document.createElement("select");
            select.id = `tip-${task.id}`;
            select.className = "form-select form-select-sm w-auto";
            select.required = true;
            approveRow.appendChild(select);

            const emptyOption = document.createElement("option");
            emptyOption.value = "";
            emptyOption.textContent = "Seçiniz...";
            select.appendChild(emptyOption);

            taskTypes.forEach((tt) => {
                const option = document.createElement("option");
                option.value = tt.value;
                option.textContent = tt.value;
                if (tt.value === varsayilanTip) {
                    option.selected = true;
                }
                select.appendChild(option);
            });

            const approveButton = document.createElement("button");
            approveButton.className = "btn btn-sm btn-success";
            approveButton.appendChild(buildIcon("check-lg", "me-1"));
            approveButton.append(document.createTextNode("Onayla"));
            approveButton.addEventListener("click", () => approveTask(task.id));
            approveRow.appendChild(approveButton);
        }

        const footer = document.createElement("div");
        footer.className = "mt-2";
        body.appendChild(footer);

        const createdAt = document.createElement("small");
        createdAt.className = "text-muted";
        createdAt.appendChild(buildIcon("clock", "me-1"));
        createdAt.append(document.createTextNode(formatDate(task.olusturmaTarihi)));
        footer.appendChild(createdAt);

        if (task.topKTahminler && task.topKTahminler.length > 0) {
            const topK = document.createElement("small");
            topK.className = "text-muted ms-3";
            topK.appendChild(buildIcon("bar-chart", "me-1"));
            topK.append(document.createTextNode("Top-3: "));
            topK.append(document.createTextNode(
                task.topKTahminler
                    .map((prediction) => `${prediction.tip} (%${Math.round(prediction.olasilik * 100)})`)
                    .join(", ")
            ));
            footer.appendChild(topK);
        }

        return card;
    }

    function approveTask(taskId) {
        const onaylananTip = document.getElementById(`tip-${taskId}`).value;
        if (!onaylananTip) {
            showAlert("Onaylanacak tip seçilmedi.", "warning");
            return;
        }

        fetch(`${API}/api/task/approve/${taskId}`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({onaylanan_tip: onaylananTip})
        })
            .then((res) => res.json())
            .then((data) => {
                if (data.success) {
                    showAlert(data.message, "success");
                    loadTasks();
                } else {
                    showAlert(data.message, "danger");
                }
            })
            .catch(() => showAlert("Bağlantı hatası.", "danger"));
    }

    function loadTasks() {
        fetch(`${API}/api/tasks`)
            .then((res) => res.json())
            .then((data) => {
                const container = document.getElementById("task-list");
                const tasks = data.tasks || [];
                const taskTypes = data.taskTypes || [];

                if (tasks.length === 0) {
                    setTaskListStaticState(`
                        <div class="text-center text-muted py-5">
                            <i class="bi bi-inbox display-4"></i>
                            <p class="mt-3">Henüz hiç talep yok.</p>
                            <a href="task_new.html" class="btn btn-outline-primary">İlk talebi oluştur</a>
                        </div>
                    `);
                    return;
                }

                const fragment = document.createDocumentFragment();
                tasks.forEach((task) => {
                    fragment.appendChild(buildTaskCard(task, taskTypes));
                });
                container.replaceChildren(fragment);
            })
            .catch(() => {
                setTaskListStaticState(`
                    <div class="text-center text-danger py-5">
                        <i class="bi bi-exclamation-circle display-4"></i>
                        <p class="mt-3">Veriler yüklenemedi. Backend bağlantısını kontrol edin.</p>
                    </div>
                `);
            });
    }

    loadTasks();
</script>

</body>
</html>
